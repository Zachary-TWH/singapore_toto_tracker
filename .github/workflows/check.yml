name: TOTO Jackpot Checker

on:
  schedule:
    - cron: "0 1 * * *"   # 9am SGT (main run)
    - cron: "0 7 * * *"   # 3pm SGT (retry 1, +6h)
    - cron: "0 13 * * *"  # 9pm SGT (retry 2, +12h)
  workflow_dispatch:       # lets you trigger manually anytime

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run checker
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: python checker.py
